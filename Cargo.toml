[package]
name = "autoclaw"
version = "0.1.0"
edition = "2024"
description = "A persistent knowledge graph engine for AI agents"
license = "Apache-2.0"

[lib]
name = "autoclaw"
crate-type = ["cdylib", "rlib"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rmp-serde = "1"
thiserror = "2"
pyo3 = { version = "0.24", features = ["extension-module"] }

[dev-dependencies]
tempfile = "3"

[[bin]]
name = "autoclaw"
path = "src/main.rs"
